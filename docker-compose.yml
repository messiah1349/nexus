services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: nexus-postgres
    environment:
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: nexus
      POSTGRES_DB: nexus
    ports:
      - "5432:5432"
    volumes:
      - nexus-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus -d nexus"]
      interval: 5s
      timeout: 3s
      retries: 10

  bot:
    build: .
    container_name: nexus-bot
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    # Inside the compose network Postgres is reachable as host "postgres",
    # not localhost — override whatever .env says so the container connects.
    environment:
      POSTGRES_URL: postgresql+asyncpg://nexus:nexus@postgres:5432/nexus

volumes:
  nexus-pgdata:
